<div class = "login-container">
    <div class ="login-card">
        <h2>Login</h2>

        <input type="text" 
        placeholder="Username"
        [(ngModel)]="username"
        />
        
        <input type="password" 
        placeholder="Password"
        [(ngModel)]="password"
        />

        <button (click)="OnLogin()" [disabled]="loading">
            {{loading ? 'Logged in...':'Login'}}

        </button>

        <p class="error-message" *ngIf="errorMessage">
            {{errorMessage}}
        </p>
    </div>
</div>
